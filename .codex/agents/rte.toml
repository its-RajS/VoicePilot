name = "rte"
description = "Release Train Engineer - PR creation, CI/CD validation, release coordination. Use when PRs need creating from completed work, CI/CD pipelines need monitoring, release coordination is needed, or post-merge cleanup is required. Does NOT write product code or merge PRs."
model = "gpt-5"
